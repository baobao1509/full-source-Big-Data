name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  # --- JOB 1: CHẠY TEST ---
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          pip install pyspark==3.5.0 pytest delta-spark==3.0.0

      - name: Run Unit Tests
        run: |
          # Dòng này giúp Python hiểu thư mục gốc là nơi chứa code
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          pytest tests/test_analyze.py

  # --- JOB 2: BUILD VÀ PUSH (Chỉ chạy khi Test Xanh) ---
  build-and-push:
    needs: test 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build Dashboard
      - name: Build and Push Dashboard
        uses: docker/build-push-action@v4
        with:
          context: ./visualize_big_data/nextJS/my-dashboard
          file: ./visualize_big_data/nextJS/my-dashboard/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/nextjs-dashboard:latest

      # Build Spark App (Dùng Dockerfile ở gốc)
      - name: Build and Push Spark
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/spark-app:latest

