name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ] # Chạy mỗi khi mày push lên nhánh main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Show all files (Debug)
        run: find . -maxdepth 5

    # 1. Đăng nhập vào Docker Hub (SỬA LẠI NHƯ NÀY)
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 2. Build và Push Image cho Dashboard (Next.js)
      - name: Build and Push Dashboard
        uses: docker/build-push-action@v4
        with:
          # Context: PHẢI LÀ THƯ MỤC (Chứa code Next.js)
          context: ./visualize_big_data/nextJS/my-dashboard
          # File: ĐƯỜNG DẪN ĐẾN FILE (Chỉ đích danh cái Dockerfile)
          file: ./visualize_big_data/nextJS/my-dashboard/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/nextjs-dashboard:latest

      # 3. Build và Push Image cho Spark App (Xử lý dữ liệu)
      # Lưu ý: Mày nên có 1 file Dockerfile_Spark ở thư mục gốc
      - name: Build and Push Spark
        uses: docker/build-push-action@v4
        with:
          context: ./
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/spark-app:latest

